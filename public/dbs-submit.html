<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Submit DBS • AquaShift</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="container">
    <div class="nav">
      <div class="brand"><a href="/" style="color:inherit;">AquaShift</a> <span class="badge">Instructor</span></div>
      <div class="nav-actions">
        <span class="badge" id="navUser">Checking session…</span>
        <a class="btn" href="/instructor-dashboard.html">Home</a>
        <a class="btn" href="/instructor-profile.html">Profile</a>
        <button class="btn danger" id="logoutBtn">Logout</button>
      </div>
    </div>

    <h1 class="h1">Submit DBS Details</h1>
    <p class="sub">Submit your DBS information for verification by your organisation.</p>

    <div id="msg" class="notice" style="display:none;"></div>

    <div class="card">
      <form id="dbsForm" class="form">
        <label>DBS check type</label>
        <select class="input" id="dbs_check_type" required>
          <option value="">Select…</option>
          <option value="basic">Basic</option>
          <option value="standard">Standard</option>
          <option value="enhanced">Enhanced</option>
        </select>

        <label>DBS issued date</label>
        <input class="input" id="dbs_issued_date" type="date" required />

        <label>Update Service member?</label>
        <select class="input" id="update_service_member">
          <option value="0">No</option>
          <option value="1">Yes</option>
        </select>

        <label>DBS reference last 4 digits (optional)</label>
        <input class="input" id="dbs_ref_last4" type="text" maxlength="4" placeholder="1234" />

        <p class="muted" style="margin-top:10px;">
          For GDPR minimisation, we store only limited DBS metadata, not the full certificate number.
        </p>

        <div class="row" style="margin-top:14px;">
          <button class="btn primary" type="submit">Submit DBS</button>
        </div>
      </form>
    </div>

    <p class="muted" style="margin-top:12px;"><a href="/instructor-profile.html">← Back to profile</a></p>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/dbs-submit.js"></script>
</body>
</html>
