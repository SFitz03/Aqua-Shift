<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Manage Shifts • AquaShift</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="container">
    <div class="nav">
      <div class="brand"><a href="/" style="color:inherit;">AquaShift</a> <span class="badge">Organisation</span></div>
      <div class="nav-actions">
        <span class="badge" id="navUser">Checking session…</span>
        <a class="btn" href="/org-dashboard.html">Dashboard</a>
        <a class="btn" href="/org-profile.html">Org Profile</a>
        <button class="btn danger" id="logoutBtn">Logout</button>
      </div>
    </div>

    <h1 class="h1">Manage Shifts</h1>
    <p class="sub">Post and manage your shifts.</p>

    <div id="msg" class="notice" style="display:none;"></div>

    <div class="grid">
      <div class="card half">
        <h3>Create Shift</h3>
        <form id="shiftForm" class="form">
          <label>Title</label>
          <input class="input" id="title" type="text" required />

          <label>Date</label>
          <input class="input" id="shift_date" type="date" required />

          <div class="row">
            <div style="flex:1;">
              <label>Start time</label>
              <input class="input" id="start_time" type="time" required />
            </div>
            <div style="flex:1;">
              <label>End time</label>
              <input class="input" id="end_time" type="time" required />
            </div>
          </div>

          <label>Level required</label>
          <input class="input" id="level_required" type="text" required />

          <label>Pay rate (£/hr)</label>
          <input class="input" id="pay_rate" type="number" step="0.01" min="0" required />

          <div class="row" style="margin-top:14px;">
            <button class="btn primary" type="submit">Post Shift</button>
            <button class="btn" type="button" id="demoBtn">Prefill demo</button>
          </div>
        </form>
      </div>

      <div class="card half">
        <h3>My Shifts</h3>

        <div class="row" style="margin-bottom:10px;">
          <select class="input" id="statusFilter" style="max-width:220px;">
            <option value="">All</option>
            <option value="open">Open</option>
            <option value="filled">Filled</option>
            <option value="cancelled">Cancelled</option>
          </select>
          <button class="btn" id="refreshBtn" type="button">Refresh</button>
        </div>

        <div id="shiftsList" class="list"></div>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/orgShifts.js"></script>
</body>
</html>
