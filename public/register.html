<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register • AquaShift</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="container">
    <div class="nav">
      <div class="brand"><a href="/" style="color:inherit;">AquaShift</a> <span class="badge">MVP</span></div>
      <div class="nav-actions">
        <span class="badge" id="navUser">Not logged in</span>
        <a class="btn" href="/login.html">Login</a>
      </div>
    </div>

    <h1 class="h1">Create an account</h1>
    <p class="sub">Choose Instructor or Organisation. After registering, you’ll complete your profile.</p>

    <div id="msg" class="notice" style="display:none;"></div>

    <div class="card">
      <form id="registerForm" class="form">
        <label>Account type</label>
        <div class="row" style="gap:14px;">
          <label style="display:flex;align-items:center;gap:8px;">
            <input type="radio" name="role" value="instructor" checked />
            Instructor
          </label>
          <label style="display:flex;align-items:center;gap:8px;">
            <input type="radio" name="role" value="organisation" />
            Organisation
          </label>
        </div>

        <label style="margin-top:10px;">Name</label>
        <input class="input" id="name" type="text" placeholder="Sam Fitzgerald / Test Organisation" required />

        <label>Email</label>
        <input class="input" id="email" type="email" placeholder="you@example.com" required />

        <label>Password</label>
        <input class="input" id="password" type="password" placeholder="Min 8 characters" required />

        <label>Confirm password</label>
        <input class="input" id="confirm" type="password" required />

        <label style="margin-top:10px;">
          <input type="checkbox" id="prototypeOk" />
          I understand this is a prototype environment
        </label>

        <div class="row" style="margin-top:14px;">
          <button class="btn primary" type="submit">Register</button>
          <a class="btn" href="/login.html">Back to Login</a>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
