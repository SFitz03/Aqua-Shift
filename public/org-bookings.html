<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Booking Requests • AquaShift</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="container">
    <div class="nav">
      <div class="brand">
        <a href="/" style="color:inherit;">AquaShift</a>
        <span class="badge">Organisation</span>
      </div>
      <div class="nav-actions">
        <span class="badge" id="navUser">Checking session…</span>
        <a class="btn" href="/org-dashboard.html">Dashboard</a>
        <a class="btn" href="/org-shifts.html">Shifts</a>
        <a class="btn" href="/org-profile.html">Org Profile</a>
        <button class="btn danger" id="logoutBtn">Logout</button>
      </div>
    </div>

    <h1 class="h1">Booking Requests</h1>
    <p class="sub">Accept or reject instructor applications.</p>

    <div id="msg" class="notice" style="display:none;"></div>

    <div class="card">
      <div class="row" style="margin-bottom:10px;">
        <select class="input" id="statusFilter" style="max-width:220px;">
          <option value="">All</option>
          <option value="requested">Requested</option>
          <option value="accepted">Accepted</option>
          <option value="rejected">Rejected</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <button class="btn" id="refreshBtn" type="button">Refresh</button>
      </div>

      <div id="bookingsList" class="list"></div>
    </div>

    <div id="ratingModal" class="card" style="display:none; margin-top:20px;">
      <h3>Rate Instructor</h3>

      <div id="starPicker" style="font-size:32px; cursor:pointer; user-select:none; margin:12px 0;">
        <span data-value="1">☆</span>
        <span data-value="2">☆</span>
        <span data-value="3">☆</span>
        <span data-value="4">☆</span>
        <span data-value="5">☆</span>
      </div>

      <div id="selectedRating" class="muted">Selected: —</div>

      <label for="ratingComment" style="display:block; margin-top:12px;">Feedback</label>
      <textarea
        id="ratingComment"
        class="input"
        rows="4"
        placeholder="What did they do well? What could improve?"
      ></textarea>

      <div class="row" style="margin-top:14px;">
        <button class="btn primary" id="submitRatingBtn" type="button">Submit Rating</button>
        <button class="btn" id="cancelRatingBtn" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/orgBookings.js"></script>
</body>
</html>
