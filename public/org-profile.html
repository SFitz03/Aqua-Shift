<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Organisation Profile • AquaShift</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="container">
    <div class="nav">
      <div class="brand"><a href="/" style="color:inherit;">AquaShift</a> <span class="badge">Organisation</span></div>
      <div class="nav-actions">
        <span class="badge" id="navUser">Checking session…</span>
        <a class="btn" href="/">Home</a>
        <a class="btn" href="/org-dashboard.html">Dashboard</a>
        <button class="btn danger" id="logoutBtn">Logout</button>
      </div>
    </div>

    <h1 class="h1">Organisation Profile</h1>
    <p class="sub">Set up your organisation details. This unlocks shift posting.</p>

    <div id="msg" class="notice" style="display:none;"></div>

    <div class="card">
      <form id="orgForm" class="form">
        <label>Organisation name</label>
        <input class="input" id="organisation_name" type="text" required />

        <label>Postcode</label>
        <input class="input" id="postcode" type="text" placeholder="BS16 1QY" required />

        <label>Contact phone</label>
        <input class="input" id="contact_phone" type="text" placeholder="07xxx xxxxxx" required />

        <div class="row" style="margin-top:14px;">
          <button class="btn primary" type="submit">Save profile</button>
          <button class="btn" type="button" id="prefillBtn">Prefill demo</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/org-profile.js"></script>
</body>
</html>
