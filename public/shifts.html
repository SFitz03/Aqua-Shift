<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shifts • AquaShift</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="container">
    <div class="nav">
      <div class="brand"><a href="/" style="color:inherit;">AquaShift</a> <span class="badge">Instructor</span></div>
      <div class="nav-actions">
        <span class="badge" id="navUser">Checking session…</span>
        <a class="btn" href="instructor-dashboard.html">Home</a>
        <a class="btn" href="/instructor-profile.html">My Profile</a>
        <button class="btn danger" id="logoutBtn">Logout</button>
      </div>
    </div>

    <h1 class="h1">Open Shifts</h1>
    <p class="sub">Apply to shifts. Track your requests below.</p>

    <div id="msg" class="notice" style="display:none;"></div>

    <div class="grid">
      <div class="card half">
        <div class="row" style="justify-content:space-between; margin-bottom:10px;">
          <h3 style="margin:0;">Available shifts</h3>
          <button class="btn" id="refreshShiftsBtn" type="button">Refresh</button>
        </div>
        <div id="openShiftsList" class="list"></div>
      </div>

      <div class="card half">
        <div class="row" style="justify-content:space-between; margin-bottom:10px;">
          <h3 style="margin:0;">My bookings</h3>
          <button class="btn" id="refreshBookingsBtn" type="button">Refresh</button>
        </div>
        <div id="myBookingsList" class="list"></div>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/shiftsPage.js"></script>
</body>
</html>
